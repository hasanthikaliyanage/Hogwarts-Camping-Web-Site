  <div class="container">
    <h1 class="form-title">Registration</h1>
    <form action="#">
      <div class="main-user-info">
        <div class="user-input-box">
          <label for="fullName">Leader's Full Name</label>
          <input type="text"
                  id="fullName"
                  name="fullName"
                  placeholder="Enter Leader's Full Name"/>
        </div>

        <div class="user-input-box">
          <label for="username">Number of Members In Group</label>
          <input type="text"
                  id="username"
                  name="username"
                  placeholder="Enter Number of Members In Your  Group "/>
        </div>

        <div class="user-input-box">
          <label for="email">Email</label>
          <input type="email"
                  id="email"
                  name="email"
                  placeholder="Enter Email"/>
        </div>

        <div class="user-input-box">
          <label for="phoneNumber">Phone Number</label>
          <input type="text"
                  id="phoneNumber"
                  name="phoneNumber"
                  placeholder="Enter Phone Number"/>
        </div>
        </div>

      <div class="Campign Duration">
        <span class="Campign Duration" style="color: white;"><h5>Campign Duration</h5></span>
        <div class="gender-category">
          <input type="radio" name="Campign Duration" id="Campign Duration">
          <label for="Campign Duration">3 Days</label>
          <input type="radio" name="Campign Duration" id="Campign Duration">
          <label for="Campign Duration">5 Days</label>
        </div>
          <br>
          

      <div class="houses">
        <span class="houses" style="color: white;"><h5>Hogwarts Houses (Select Your House)</h5></span>
        <div class="gender-category">
          <input type="radio" name="house" id="Gryffindor">
          <label for="Gryffindor">Gryffindor</label>
          <input type="radio" name="house" id="Hufflepuff">
          <label for="Hufflepuff">Hufflepuff</label>
          <input type="radio" name="house" id="Ravenclaw">
          <label for="Ravenclaw">Ravenclaw</label>
          <input type="radio" name="house" id="Slytherin">
          <label for="Slytherin">Slytherin</label>
        </div>
      </div>
      <div class="form-submit-btn">
        <input type="submit" value="Register">
      </div>
    </form>
